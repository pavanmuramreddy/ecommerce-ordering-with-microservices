syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.ecommerce.grpc";

service PaymentService {
  rpc processPayment (PaymentRequest) returns (PaymentResponse);
}

message PaymentRequest {
  double amount = 1;
  string orderId = 2;
}

message PaymentResponse {
  bool success = 1;
}